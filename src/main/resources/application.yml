spring:
  application:
    name: order-management-system
  datasource:
    url: jdbc:h2:mem:oms;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# Business configuration for the order management system.
oms:
  home-country-code: US
  default-currency: USD
  free-shipping-threshold: 75.00
  handling-fee: 1.50
  max-stacked-discount-percent: 40
  hazardous-surcharge: 8.00

logging:
  level:
    com.acmeretail.oms: INFO
